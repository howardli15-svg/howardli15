<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>希晨 的 AR 展覽館</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; padding-top: 15%;
            z-index: 9999; font-family: sans-serif;
        }
        #start-overlay::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.3); z-index: -1;
        }
        #start-button {
            padding: 18px 45px; font-size: 20px; background-color: #f1c40f;
            color: #2c3e50; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; box-shadow: 0 6px 15px rgba(0,0,0,0.3); margin-top: 20px;
        }
        .title-text {
            font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="title-text">希晨 的成長時刻<br>AR 互動展覽館</div>
        <button id="start-button">進入體驗</button>
    </div>

    <!-- 關鍵修改：加咗 maxTrack: 2 容許同時追蹤多個目標 -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
        
        <!-- 關鍵修改：11條片都有自己單獨嘅影片標籤，唔會再互相搶資源 -->
        <a-assets>
            <video id="video0" src="./video0.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video1" src="./video1.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video2" src="./video2.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video3" src="./video3.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video4" src="./video4.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video5" src="./video5.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video6" src="./video6.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video7" src="./video7.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video8" src="./video8.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video9" src="./video9.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="video10" src="./video10.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- 11 個相片目標對應各自的畫面 -->
        <a-entity mindar-image-target="targetIndex: 0"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 4"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 5"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 6"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 7"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 8"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 9"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 10"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const startOverlay = document.querySelector('#start-overlay');
        const planes = document.querySelectorAll('.ar-plane');

        // 哪些影片需要靜音（圖 0, 1, 6, 7）
        const mutedIndexes = [0, 1, 6, 7];

        startButton.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            // 經由使用者點擊，預先加載所有影片解鎖播放權限
            for (let i = 0; i <= 10; i++) {
                const v = document.querySelector(`#video${i}`);
                v.muted = mutedIndexes.includes(i);
                v.play().then(() => { v.pause(); }).catch(() => {});
            }
        });

        document.querySelectorAll('[mindar-image-target]').forEach((target, index) => {
            const currentVideo = document.querySelector(`#video${index}`);

            target.addEventListener('targetFound', () => {
                // 直接將該目標對應的獨立影片綁上平面
                planes[index].setAttribute('material', `src: #video${index}; shader: flat; transparent: true`);
                currentVideo.play();
            });
            
            target.addEventListener('targetLost', () => { 
                currentVideo.pause(); 
                planes[index].removeAttribute('material');
            });
        });
    </script>
</body>
</html>
