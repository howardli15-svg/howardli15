<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系統底牌偵探模式</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.9); color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: sans-serif;
      }
      #start-button {
        padding: 15px 35px; font-size: 18px; background-color: #28a745;
        color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;
      }
      /* 偵探專用紅色大字板 */
      #debug-board {
        position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
        background-color: #e74c3c; color: white; font-size: 22px; font-weight: bold;
        padding: 15px 25px; border-radius: 10px; z-index: 9999; display: none;
        text-align: center; width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>

    <div id="start-overlay">
      <p style="margin-bottom: 20px; font-size: 16px;">偵探模式已就緒</p>
      <button id="start-button">點擊開始找錯處</button>
    </div>

    <div id="debug-board">等待掃描中...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video0" src="./video0.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video1" src="./video1.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video2" src="./video2.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video3" src="./video3.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video4" src="./video4.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0"><a-video src="#video0" width="1" height="1.777" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 1"><a-video src="#video1" width="1" height="0.5625" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 2"><a-video src="#video2" width="1" height="1.777" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 3"><a-video src="#video3" width="1" height="1.777" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 4"><a-video src="#video4" width="1" height="0.5625" position="0 0 0"></a-video></a-entity>
      
    </a-scene>

    <script>
      const startOverlay = document.querySelector('#start-overlay');
      const startButton = document.querySelector('#start-button');
      const debugBoard = document.querySelector('#debug-board');

      startButton.addEventListener('click', () => {
        startOverlay.style.display = 'none';
        for (let i = 0; i <= 4; i++) {
          const v = document.querySelector(`#video${i}`);
          if (v) { v.play().then(() => { v.pause(); }).catch(e => console.log(e)); }
        }
      });

      for (let i = 0; i <= 4; i++) {
        const targetEl = document.querySelectorAll('[mindar-image-target]')[i];
        const videoEl = document.querySelector(`#video${i}`);
        if (targetEl && videoEl) {
          targetEl.addEventListener("targetFound", () => {
            // 彈出紅色大字，話畀你知系統當呢張相係 Index 幾多！
            debugBoard.style.display = 'block';
            debugBoard.innerText = `🚨 系統當呢張相係：Index ${i} 🚨`;
            
            videoEl.currentTime = 0;
            videoEl.play().catch(e => console.log(e));
          });
          targetEl.addEventListener("targetLost", () => {
            debugBoard.style.display = 'none';
            videoEl.pause();
          });
        }
      }
    </script>
  </body>
</html>
