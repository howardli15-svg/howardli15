<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的免費無水印 WebAR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* 新增：開始按鈕嘅樣式 */
      #start-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: sans-serif;
      }
      #start-button {
        padding: 12px 24px;
        font-size: 18px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>

    <div id="start-overlay">
      <p style="margin-bottom: 20px; font-size: 16px;">準備進入 AR 體驗</p>
      <button id="start-button">點擊這裡開始</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video.mp4" preload="auto" loop="true" muted="true" playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.5625" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const startOverlay = document.querySelector('#start-overlay');
      const startButton = document.querySelector('#start-button');
      const videoElement = document.querySelector('#ar-video');
      const targetEntity = document.querySelector('[mindar-image-target]');
      
      let isUnlocked = false;

      // 當使用者點擊「開始」按鈕
      startButton.addEventListener('click', () => {
        // 預先輕輕播一吓再暫停，用嚟呃過手機瀏覽器，解鎖播放權限
        videoElement.play().then(() => {
          videoElement.pause();
          isUnlocked = true;
          startOverlay.style.display = 'none'; // 隱藏按鈕遮罩
        }).catch((err) => {
          console.error("解鎖影片失敗:", err);
          startOverlay.style.display = 'none';
        });
      });

      // 監聽辨識狀態
      targetEntity.addEventListener("targetFound", () => {
        console.log("搵到相片！");
        // 確保已經點擊解鎖咗先播
        videoElement.play().catch(e => console.log("播放被阻擋:", e));
      });

      targetEntity.addEventListener("targetLost", () => {
        console.log("移開鏡頭");
        videoElement.pause();
      });
    </script>
  </body>
</html>
