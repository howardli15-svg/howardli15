<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5套型號 (單引擎突破極限版)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.9); color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: sans-serif;
      }
      #start-button {
        padding: 15px 35px; font-size: 18px; background-color: #28a745;
        color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;
      }
    </style>
  </head>
  <body>

    <div id="start-overlay">
      <p style="margin-bottom: 20px; font-size: 16px;">單引擎 AR 系統準備就緒</p>
      <button id="start-button">點擊這裡開始</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="main-video" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4">
        <a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity>
      </a-entity>
      
    </a-scene>

    <script>
      const startOverlay = document.querySelector('#start-overlay');
      const startButton = document.querySelector('#start-button');
      
      const video = document.querySelector('#main-video');
      const targets = document.querySelectorAll('[mindar-image-target]');
      const planes = document.querySelectorAll('.ar-plane');

      // 影片資料庫：記錄每張相要播邊段片、有無聲
      const videoConfig = [
        { src: './video0.mp4', needsSound: false },
        { src: './video1.mp4', needsSound: false },
        { src: './video2.mp4', needsSound: true },
        { src: './video3.mp4', needsSound: true },
        { src: './video4.mp4', needsSound: true }
      ];

      // 點擊綠色掣，拎到手機最高播放權限
      startButton.addEventListener('click', () => {
        startOverlay.style.display = 'none';
        video.src = videoConfig[0].src; 
        video.muted = true;
        video.play().then(() => { video.pause(); }).catch(e => console.log(e));
      });

      // 智能換帶系統
      targets.forEach((target, index) => {
        target.addEventListener('targetFound', () => {
          video.pause();
          
          // 先將所有畫布洗乾淨，防止殘影
          planes.forEach(p => p.removeAttribute('material'));

          // 瞬間換上專屬嘅影片同設定
          video.src = videoConfig[index].src;
          video.muted = !videoConfig[index].needsSound;
          video.load();

          // 將影片畫面黐落去依家掃到嗰張相嘅畫布度
          planes[index].setAttribute('material', 'src: #main-video; shader: flat; transparent: true');

          video.currentTime = 0;
          video.play().catch(e => console.log(e));
        });

        target.addEventListener('targetLost', () => {
          video.pause();
          // 移開相機，即刻搣走張畫布
          planes[index].removeAttribute('material');
        });
      });
    </script>
  </body>
</html>
