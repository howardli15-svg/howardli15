<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5套型號完美慳RAM版</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.9); color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: sans-serif;
      }
      #start-button {
        padding: 15px 35px; font-size: 18px; background-color: #28a745;
        color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;
      }
    </style>
  </head>
  <body>

    <div id="start-overlay">
      <p style="margin-bottom: 20px; font-size: 16px;">5套全能 AR 系統已就緒</p>
      <button id="start-button">點擊這裡開始</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video0" src="./video0.mp4" preload="metadata" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video1" src="./video1.mp4" preload="metadata" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video2" src="./video2.mp4" preload="metadata" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video3" src="./video3.mp4" preload="metadata" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="video4" src="./video4.mp4" preload="metadata" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0"><a-video src="#video0" width="1" height="1.777" scale="1.05 1.05 1" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 1"><a-video src="#video1" width="1" height="0.5625" scale="1.05 1.05 1" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 2"><a-video src="#video2" width="1" height="1.777" scale="1.05 1.05 1" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 3"><a-video src="#video3" width="1" height="1.777" scale="1.05 1.05 1" position="0 0 0"></a-video></a-entity>
      <a-entity mindar-image-target="targetIndex: 4"><a-video src="#video4" width="1" height="0.5625" scale="1.05 1.05 1" position="0 0 0"></a-video></a-entity>
      
    </a-scene>

    <script>
      const startOverlay = document.querySelector('#start-overlay');
      const startButton = document.querySelector('#start-button');

      startButton.addEventListener('click', () => {
        startOverlay.style.display = 'none';
        // 輕量級解鎖，唔會逼爆 RAM
        for (let i = 0; i <= 4; i++) {
          const v = document.querySelector(`#video${i}`);
          if (v) { v.play().then(() => { v.pause(); }).catch(e => console.log(e)); }
        }
      });

      for (let i = 0; i <= 4; i++) {
        const targetEl = document.querySelectorAll('[mindar-image-target]')[i];
        const videoEl = document.querySelector(`#video${i}`);
        if (targetEl && videoEl) {
          targetEl.addEventListener("targetFound", () => {
            videoEl.currentTime = 0;
            videoEl.play().catch(e => console.log(e));
          });
          targetEl.addEventListener("targetLost", () => {
            videoEl.pause();
          });
        }
      }
    </script>
  </body>
</html>
