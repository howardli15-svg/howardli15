<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的免費無水印 WebAR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #start-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.85); color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: sans-serif;
      }
      #start-button {
        padding: 15px 30px; font-size: 18px; background-color: #007bff;
        color: white; border: none; border-radius: 25px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="start-overlay">
      <p style="margin-bottom: 20px; font-size: 16px;">AR 系統已準備就緒</p>
      <button id="start-button">點擊這裡開始</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video.mp4" preload="auto" loop="true" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.5625" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const startOverlay = document.querySelector('#start-overlay');
      const startButton = document.querySelector('#start-button');
      const videoElement = document.querySelector('#ar-video');
      const targetEntity = document.querySelector('[mindar-image-target]');

      // 一點擊按鈕，立刻啟動播放，拿到最高權限
      startButton.addEventListener('click', () => {
        videoElement.play().then(() => {
          startOverlay.style.style.display = 'none';
        }).catch((err) => {
          console.log("播放啟動", err);
          // 萬一失敗也強制關閉遮罩
          startOverlay.style.display = 'none'; 
        });
      });

      // 監聽辨識狀態
      targetEntity.addEventListener("targetFound", () => {
        console.log("搵到相片！");
        // 唔再 call play()，直接將時間回彈去 0 秒，等觀眾由頭睇起
        videoElement.currentTime = 0;
      });

      targetEntity.addEventListener("targetLost", () => {
        console.log("移開鏡頭");
      });
    </script>
  </body>
</html>
