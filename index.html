<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyson 的 AR 展覽館</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; font-family: sans-serif;
        }
        #start-overlay::before {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        #start-button {
            padding: 18px 45px; font-size: 20px; background-color: #f1c40f;
            color: #2c3e50; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .title-text {
            margin-bottom: 40px; font-size: 28px; font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); text-align: center;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div id="start-overlay">
        <div class="title-text">Hyson 的成長時刻<br>AR 互動展覽館</div>
        <button id="start-button">進入體驗</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="main-video" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 1.777" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
        <a-entity mindar-image-target="targetIndex: 4"><a-entity class="ar-plane" geometry="primitive: plane; width: 1; height: 0.5625" scale="1.05 1.05 1" position="0 0 0"></a-entity></a-entity>
    </a-scene>

    <script>
        const startOverlay = document.querySelector('#start-overlay');
        const startButton = document.querySelector('#start-button');
        const video = document.querySelector('#main-video');
        const music = document.querySelector('#bg-music');
        const targets = document.querySelectorAll('[mindar-image-target]');
        const planes = document.querySelectorAll('.ar-plane');

        startButton.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            music.play().catch(e => console.log("音樂播放:", e)); // 撳掣播音樂
            video.src = './video0.mp4'; video.load(); video.play().then(() => video.pause()).catch(e => console.log(e));
        });

        targets.forEach((target, index) => {
            target.addEventListener('targetFound', () => {
                video.src = `./video${index}.mp4`; video.muted = (index < 2); video.load(); video.play();
                planes.forEach((p, i) => p.setAttribute('material', i === index ? 'src: #main-video; shader: flat; transparent: true' : 'visible: false'));
            });
            target.addEventListener('targetLost', () => { video.pause(); });
        });
    </script>
</body>
</html>
